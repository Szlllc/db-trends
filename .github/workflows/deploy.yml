name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        # vite.config.ts 中已设置 base: '/db-trends/202604/'
        # 所以 index.html 内的资源引用都带有此前缀

      - name: Prepare Pages directory structure
        run: |
          # 将 dist/ 内容放入 dist-pages/202604/
          # 这样 GitHub Pages 就会在 /db-trends/202604/ 下提供服务
          mkdir -p dist-pages/202604
          cp -r dist/. dist-pages/202604/
          # 在根路径放一个自动跳转，访问 /db-trends/ 时跳到 /db-trends/202604/
          echo '<meta http-equiv="refresh" content="0; url=/db-trends/202604/">' > dist-pages/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist-pages'   # 上传含 202604/ 子目录的父目录

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
