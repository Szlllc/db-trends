name: Deploy to GitHub Pages

on:
  push:
    branches: [main] # 监听到 main 分支有更新时触发

permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一个部署任务，避免并发冲突
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages          # 必须声明，GitHub Pages 部署依赖此 environment
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        # vite.config.ts 中已设置 base: '/db-trends/202604/'
        # 构建产物会自动使用该前缀，无需额外环境变量

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # 指向打包后的输出目录

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
